# ── Jackson: fechas como ISO strings, no como arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5433/invernadero
spring.datasource.username=invernadero
spring.datasource.password=invernadero
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Servidor
server.port=8080

# ── Internacionalización
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.default-locale=es

# ── OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email

# ── CORS
cors.allowed-origins=http://localhost:5173

# ── Frontend URL (para redirect tras login/logout)
app.frontend-url=http://localhost:5173
