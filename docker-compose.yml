version: '3.9'

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: invernadero
      POSTGRES_USER: invernadero
      POSTGRES_PASSWORD: invernadero
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/invernadero
      SPRING_DATASOURCE_USERNAME: invernadero
      SPRING_DATASOURCE_PASSWORD: invernadero
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APP_FRONTEND_URL: http://localhost
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
