name: CI - Build y pruebas

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend - Spring Boot y JUnit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: invernadero_test
          POSTGRES_USER: invernadero
          POSTGRES_PASSWORD: invernadero
        ports:
          - "5433:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Ejecutar pruebas unitarias backend
        working-directory: backend
        run: mvn test -P test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Publicar reportes JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend - React y Vite
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Compilar frontend
        working-directory: frontend
        run: npm run build

      - name: Publicar build frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  selenium:
    name: E2E - Selenium
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Selenium
        run: pip install selenium webdriver-manager

      - name: Ejecutar pruebas E2E
        run: python frontend/tests/selenium_tests.py
        continue-on-error: true
